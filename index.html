<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacho Inteligente</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <section id="login" class="login-container">
        <div class="login-card">
            <h1>🌿 Tacho Inteligente</h1>
            <p>Control web ESP32</p>

            <input type="text" id="usuario" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">

            <button onclick="iniciarSesion()">Iniciar sesión</button>

            <p id="mensajeError"></p>
        </div>
    </section>

    <section id="panel" class="panel-container oculto">
        <div class="panel-card">
            <h1>🌱 Panel del Tacho Inteligente</h1>
            <p class="subtitulo">Naturaleza + Tecnología + ESP32</p>

            <div class="control">
                <span id="luzPower" class="luz roja"></span>
                <h2>Encender / Apagar</h2>

                <label class="switch">
                    <input type="checkbox" id="btnPower">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="capacidad-box">
                <h2>Capacidad del basurero</h2>
                <div class="barra">
                    <div id="barraCapacidad" class="barra-interna">65%</div>
                </div>
            </div>

            <div id="alerta" class="alerta">
                ⚠️ Alerta: el basurero está por llenarse
            </div>

            <div class="control">
                <span id="luzAbrir" class="luz roja"></span>
                <h2>Abrir tapa</h2>
                <button id="btnAbrir" class="boton-normal">Abrir</button>
            </div>

            <div class="control">
                <span id="luzReiniciar" class="luz roja"></span>
                <h2>Reiniciar sistema</h2>
                <button id="btnReiniciar" class="boton-peligro">Reinicio</button>
            </div>

            <button class="cerrar" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
